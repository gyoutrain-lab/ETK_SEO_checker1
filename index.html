<!DOCTYPE html>
<!-- 1. CRITICAL: Lang attribute is required for accessibility & SEO scoring -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- 2. CRITICAL: Viewport tag required for mobile-friendly checks -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 3. CRITICAL: Character length must be 50-60 characters with high-value keywords -->
    <title>ETK Global | Global Supply Chain & Logistics Solutions</title>
    
    <!-- 4. CRITICAL: Meta description must be 120-160 characters or checkers penalize it -->
    <meta name="description" content="ETK Global provides world-class supply chain management, international freight forwarding, and integrated logistics solutions globally.">
    
    <!-- 5. CRITICAL: The exact canonical link to prevent duplicate content flags -->
    <link rel="canonical" href="https://gyoutrain-lab.github.io/ETKGlobal/" />
    
    <!-- 6. ACCESSIBILITY: Theme color for browser status bars -->
    <meta name="theme-color" content="#1e3a8a">

    <!-- Open Graph (Required for Social Media SEO Checks) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ETK Global | Global Logistics Solutions" />
    <meta property="og:description" content="Streamline your international freight and supply chain operations with ETK Global." />
    <meta property="og:url" content="https://gyoutrain-lab.github.io/ETKGlobal/" />
    <!-- Replace with a real preview image path when available -->
    <meta property="og:image" content="https://gyoutrain-lab.github.io/ETKGlobal/images/og-share.jpg" />
    
    <!-- Structured Data / JSON-LD (Guarantees major bonus points on SEO engines) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ETK Global",
      "url": "https://gyoutrain-lab.github.io/ETKGlobal/",
      "logo": "https://gyoutrain-lab.github.io/ETKGlobal/images/logo.png",
      "description": "Global supply chain management and integrated logistics provider."
    }
    </script>

    <style>
        /* Modern, blazing-fast CSS layout with high color contrast for Accessibility scores */
        :root {
            --primary: #1e3a8a;
            --dark: #0f172a;
            --light: #f8fafc;
            --text-main: #334155;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-main);
            background-color: #ffffff;
            line-height: 1.5;
        }
        header {
            background-color: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
        }
        nav a {
            color: var(--text-main);
            text-decoration: none;
            margin-left: 1.5rem;
            font-weight: 500;
        }
        nav a:hover {
            color: var(--primary);
        }
        .hero {
            padding: 5rem 2rem;
            text-align: center;
            background-color: var(--light);
        }
        /* High-contrast font colors prevent accessibility score drops */
        .hero h1 {
            font-size: 2.75rem;
            color: var(--dark);
            margin: 0 0 1rem 0;
        }
        .hero p {
            font-size: 1.25rem;
            max-width: 600px;
            margin: 0 auto 2rem auto;
            color: var(--text-main);
        }
        .cta-btn {
            display: inline-block;
            background-color: var(--primary);
            color: #ffffff;
            padding: 0.75rem 1.75rem;
            border-radius: 0.375rem;
            text-decoration: none;
            font-weight: 600;
        }
        .cta-btn:hover {
            background-color: #1e40af;
        }
        footer {
            background-color: var(--dark);
            color: #94a3b8;
            text-align: center;
            padding: 2rem 1rem;
            margin-top: auto;
        }
        footer a {
            color: #ffffff;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <!-- 7. CRITICAL SEMANTIC TAGS: Use <header>, <main>, <footer> instead of <div> -->
    <header>
        <a href="https://gyoutrain-lab.github.io/ETKGlobal/" class="logo">ETK Global</a>
        <nav>
            <!-- 8. CRITICAL: Every link MUST have clear text. Never leave an <a> tag empty or just an icon -->
            <a href="https://gyoutrain-lab.github.io/ETKGlobal/">Home</a>
            <a href="https://gyoutrain-lab.github.io/ETKGlobal/#services">Services</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <!-- 9. CRITICAL: Exactly ONE <h1> tag per page, containing your core title -->
            <h1>Smart Logistics For A Connected World</h1>
            <p>Reliable cargo shipping, customs brokerage, and warehouse fulfillment optimized to scale your international business operations effortlessly.</p>
            <a href="https://gyoutrain-lab.github.io/ETKGlobal/#contact" class="cta-btn">Get a Quote</a>
        </section>
    </main>

    <footer>
        <!-- 10. CRITICAL: Fully qualified matching footer links -->
        <p>&copy; 2026 <a href="https://gyoutrain-lab.github.io/ETKGlobal/">ETK Global</a>. All rights reserved.</p>
    </footer>

</body>
</html>
